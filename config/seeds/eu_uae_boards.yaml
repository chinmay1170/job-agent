# Curated seed list: companies that (a) are known visa sponsors in EU/UK/UAE/AU
# (or are UAE-based) and (b) host jobs on a public ATS board.
#
# EVERY entry was verified with a live HTTP request to the matching public ATS
# API on 2026-06-11, requiring HTTP 200 AND at least one live job posting
# (dormant boards — e.g. Workable accounts left behind after an ATS migration,
# lever/atlassian with 0 postings — were excluded):
#   greenhouse:      boards-api.greenhouse.io/v1/boards/{slug}/jobs
#   lever:           api.lever.co/v0/postings/{slug}?mode=json (+ api.eu.lever.co)
#   ashby:           api.ashbyhq.com/posting-api/job-board/{slug}
#   workable:        apply.workable.com/api/v3/accounts/{slug}/jobs (total > 0)
#   smartrecruiters: api.smartrecruiters.com/v1/companies/{slug}/postings (totalFound > 0
#                    — the endpoint returns 200 for ANY identifier, so 200 alone is meaningless)
#
# region: eu|uk|uae|au|us   ats: greenhouse|lever|ashby|workable|smartrecruiters
