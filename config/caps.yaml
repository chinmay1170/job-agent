# Volume guardrail (deliverability / anti-bot), NOT a target — apply as many
# queued jobs as exist up to this, ordered by selection_chance desc.
# Raised 25->50 on 2026-06-12: user wants the whole >=25% queue submitted.
applications_per_day: 130   # user: apply the whole queue today

# Per-platform daily submission caps — anti-bot defense. On 2026-06-12 ~27
# submits/day triggered SmartRecruiters DataDome captchas + Ashby spam flags.
# Spreading volume across platforms keeps each under its per-IP ceiling.
# SmartRecruiters kept very low (DataDome-walled; captcha auto-routes to manual).
per_platform_daily_caps:
  smartrecruiters: 2     # one domain, DataDome — keep very low
  ashby: 12              # one domain, spam-flags if hammered
  greenhouse: 60         # raised to drain queue today (user request)
  lever: 25
  workable: 25
  generic: 70            # spans MANY distinct careers domains (mongodb.com,
                         # jobs.elastic.co, datadog, asana...) — not one ATS,
                         # so no single-IP ceiling; this was the volume limiter
# Minimum seconds between two submits to the SAME platform (rapid-fire to one
# ATS trips its rate detection). The 25-70s inter-job sleep stays as a floor.
per_platform_min_gap_seconds:
  smartrecruiters: 300   # DataDome — keep slow
  ashby: 120             # spam-flags if hammered
  greenhouse: 35         # never rate-limited us — speed up for volume
  lever: 35
  workable: 35
  generic: 30            # diverse careers domains — low per-IP risk
emails_per_day: 10             # hard ceiling 20; deliverability protection
emails_hard_max: 20
per_company_lifetime: 5   # raised 3->5 for volume (distinct teams at big cos)
company_cooldown_days: 30
max_apply_minutes_per_run: 180
min_email_gap_minutes: 8
email_send_window: {start_hour: 9, end_hour: 18}   # recipient-local approx
email_weekends: false
followup_after_days: 7
field_confidence_threshold: 0.85
# Apply when the judge's estimated selection_chance (P of a positive recruiter
# response) is at least this. selection_chance is a TRUE probability — real
# cold-application reply odds top out ~25-35% even for strong matches, so 25
# is the practical floor for volume. Calibration data will tell us if it holds.
min_selection_chance: 20
# Mark applications with no recruiter reply after this many days as no_response
# (keeps the calibration denominator honest).
no_response_after_days: 14
exclude_remote: true           # relocation/visa path only — skip remote-only roles
dry_run: false                 # LIVE since 2026-06-12 (user-approved); outreach still shadows first 3 days via --shadow
# Which resume PDF gets uploaded to applications and outreach:
#   original = the user's own hand-made PDF (config/Chinmay_Krishna_Resume.pdf)
#   tailored = per-job Typst-generated PDF (riskier: AI-resume filters)
# 'tailored' (2026-06-23): resume_pdf returns each application's own resume_path
# — the driver sets a per-JD tailored v2 PDF for high-fit (>=tailor_min_chance)
# roles, and the original master PDF for everything else.
resume_mode: tailored
original_resume_path: config/Chinmay_Krishna_Resume.pdf
# Roles >= this selection_chance get a per-JD tailored resume. Set to 30 (not
# 35) because the sponsorship-realistic judge clusters most roles at 20-34, and
# the >=35 roles were already applied with the master pre-tailoring — 30 lets
# the tailoring experiment actually run on the live queue's better half.
tailor_min_chance: 30
# Headed browser for applies: headless Chromium leaks rendering tells that
# Ashby/SmartRecruiters spam detection keys on (Ashby flagged a submission
# 2026-06-12). A visible window during runs is the tradeoff.
apply_headless: true   # headed crashes in background (TargetClosedError); headless
                       # is stable + stealth JS still applies. SmartRecruiters/Ashby
                       # (which wanted headed) are captcha-walled/low-capped anyway.
